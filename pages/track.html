<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Health - WellnessPath</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="#">About</a></li>
          <li><a href="track.html">Track</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1>Track Your Health</h1>

      <section>
        <h2>Water</h2>
        <input type="number" id="water" placeholder="Glasses of water" />
        <div class="log-display" id="water-display"></div>
        <button onclick="logValue('water')">Log Water</button>
        <button onclick="clearValue('water')">Clear</button>
      </section>

      <section>
        <h2>Exercise</h2>
        <input
          type="text"
          id="exercise"
          placeholder="Workout type or duration"
        />
        <div class="log-display" id="exercise-display"></div>
        <button onclick="logValue('exercise')">Log Exercise</button>
        <button onclick="clearValue('exercise')">Clear</button>
      </section>

      <section>
        <h2>Food</h2>
        <input type="text" id="food" placeholder="Meal or calories" />
        <div class="log-display" id="food-display"></div>
        <button onclick="logValue('food')">Log Food</button>
        <button onclick="clearValue('food')">Clear</button>
      </section>

      <section>
        <h2>Sleep</h2>
        <input type="number" id="sleep" placeholder="Hours slept" />
        <div class="log-display" id="sleep-display"></div>
        <button onclick="logValue('sleep')">Log Sleep</button>
        <button onclick="clearValue('sleep')">Clear</button>
      </section>

      <section>
        <h2>Mindfulness</h2>
        <input
          type="text"
          id="mindfulness"
          placeholder="Meditation / Journaling"
        />
        <div class="log-display" id="mindfulness-display"></div>
        <button onclick="logValue('mindfulness')">Log Mindfulness</button>
        <button onclick="clearValue('mindfulness')">Clear</button>
      </section>
    </main>
    <script src="../js/app.js"></script>
  </body>
</html>
